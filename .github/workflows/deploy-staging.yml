name: Deploy to Staging

on:
  workflow_run:
    workflows: ["CI"]
    types: [completed]
    branches: [main]

concurrency:
  group: deploy-staging
  cancel-in-progress: true

jobs:
  deploy-staging:
    name: Build & Deploy — Staging
    runs-on: ubuntu-latest
    environment: staging
    if: ${{ github.event.workflow_run.conclusion == 'success' }}

    permissions:
      contents: read
      packages: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          ref: ${{ github.event.workflow_run.head_sha }}

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract metadata (backend)
        id: meta-backend
        uses: docker/metadata-action@v5
        with:
          images: ghcr.io/${{ github.repository }}/backend
          tags: |
            type=sha,prefix=staging-
            type=raw,value=staging-latest

      - name: Extract metadata (frontend)
        id: meta-frontend
        uses: docker/metadata-action@v5
        with:
          images: ghcr.io/${{ github.repository }}/frontend
          tags: |
            type=sha,prefix=staging-
            type=raw,value=staging-latest

      - name: Build & push backend image
        uses: docker/build-push-action@v5
        with:
          context: secure-sacco/backend/backend
          file: secure-sacco/backend/backend/Dockerfile
          push: true
          tags: ${{ steps.meta-backend.outputs.tags }}
          labels: ${{ steps.meta-backend.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Build & push frontend image
        uses: docker/build-push-action@v5
        with:
          context: secure-sacco/frontend
          file: secure-sacco/frontend/Dockerfile
          push: true
          tags: ${{ steps.meta-frontend.outputs.tags }}
          labels: ${{ steps.meta-frontend.outputs.labels }}
          build-args: |
            VITE_API_BASE_URL=${{ vars.STAGING_API_URL }}/api/v1
          cache-from: type=gha
          cache-to: type=gha,mode=max
          no-cache: true

      # ── Ensure deploy directory exists on server ─────────────────────────────
      - name: Bootstrap deploy directory
        uses: appleboy/ssh-action@v1
        with:
          host: ${{ secrets.STAGING_HOST }}
          username: ${{ secrets.STAGING_USER }}
          key: ${{ secrets.STAGING_SSH_KEY }}
          passphrase: ${{ secrets.STAGING_SSH_PASSPHRASE }}
          script: mkdir -p /opt/sacco-staging

      # ── Copy docker-compose to server ────────────────────────────────────────
      # Source: secure-sacco/infra/docker-compose.prod.yml
      # strip_components: 2 removes 'secure-sacco/' and 'infra/'
      # Result on server: /opt/sacco-staging/docker-compose.prod.yml
      - name: Copy docker-compose to staging server
        uses: appleboy/scp-action@v0.1.7
        with:
          host: ${{ secrets.STAGING_HOST }}
          username: ${{ secrets.STAGING_USER }}
          key: ${{ secrets.STAGING_SSH_KEY }}
          passphrase: ${{ secrets.STAGING_SSH_PASSPHRASE }}
          source: secure-sacco/infra/docker-compose.prod.yml
          target: /opt/sacco-staging/
          strip_components: 2

      - name: Deploy to staging server
        uses: appleboy/ssh-action@v1
        env:
          APP_FIELD_ENCRYPTION_KEY: ${{ secrets.APP_FIELD_ENCRYPTION_KEY }}
          APP_PII_HMAC_KEY: ${{ secrets.APP_PII_HMAC_KEY }}
          REDIS_PASSWORD: ${{ secrets.REDIS_PASSWORD }}
          DB_USERNAME: ${{ secrets.STAGING_DB_USERNAME }}
          DB_PASSWORD: ${{ secrets.STAGING_DB_PASSWORD }}
          APP_OFFICIAL_EMAIL_DOMAIN: ${{ vars.APP_OFFICIAL_EMAIL_DOMAIN }}
          APP_DEFAULT_ADMIN_EMAIL: ${{ vars.APP_DEFAULT_ADMIN_EMAIL }}
          APP_DEFAULT_ADMIN_PASSWORD: ${{ secrets.APP_DEFAULT_ADMIN_PASSWORD }}
          APP_DEFAULT_ADMIN_PHONE: ${{ vars.APP_DEFAULT_ADMIN_PHONE }}
          MPESA_CONSUMER_KEY: ${{ secrets.MPESA_CONSUMER_KEY }}
          MPESA_CONSUMER_SECRET: ${{ secrets.MPESA_CONSUMER_SECRET }}
          MPESA_PASSKEY: ${{ secrets.MPESA_PASSKEY }}
          MPESA_SHORTCODE: ${{ vars.MPESA_SHORTCODE }}
          MPESA_CALLBACK_BASE_URL: ${{ vars.MPESA_CALLBACK_BASE_URL }}
          STAGING_GHCR_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          GITHUB_ACTOR: ${{ github.actor }}
          BACKEND_IMAGE: ghcr.io/${{ github.repository }}/backend:staging-latest
          FRONTEND_IMAGE: ghcr.io/${{ github.repository }}/frontend:staging-latest
          STAGING_FRONTEND_URL: ${{ vars.STAGING_FRONTEND_URL }}
        with:
          host: ${{ secrets.STAGING_HOST }}
          username: ${{ secrets.STAGING_USER }}
          key: ${{ secrets.STAGING_SSH_KEY }}
          passphrase: ${{ secrets.STAGING_SSH_PASSPHRASE }}
          # 15m gives Spring Boot plenty of time to start even cold.
          # The SSH step itself should complete in <2 min because
          # docker compose up -d no longer waits for healthchecks.
          command_timeout: 15m
          envs: APP_FIELD_ENCRYPTION_KEY,APP_PII_HMAC_KEY,REDIS_PASSWORD,DB_USERNAME,DB_PASSWORD,APP_OFFICIAL_EMAIL_DOMAIN,APP_DEFAULT_ADMIN_EMAIL,APP_DEFAULT_ADMIN_PASSWORD,APP_DEFAULT_ADMIN_PHONE,MPESA_CONSUMER_KEY,MPESA_CONSUMER_SECRET,MPESA_PASSKEY,MPESA_SHORTCODE,MPESA_CALLBACK_BASE_URL,STAGING_GHCR_TOKEN,GITHUB_ACTOR,BACKEND_IMAGE,FRONTEND_IMAGE,STAGING_FRONTEND_URL
          script: |
            set -e
            cd /opt/sacco-staging

            echo "$STAGING_GHCR_TOKEN" | docker login ghcr.io -u "$GITHUB_ACTOR" --password-stdin

            # Write .env using printf — avoids heredoc indentation issues in YAML
            {
              printf 'APP_FIELD_ENCRYPTION_KEY=%s\n' "$APP_FIELD_ENCRYPTION_KEY"
              printf 'APP_PII_HMAC_KEY=%s\n' "$APP_PII_HMAC_KEY"
              printf 'REDIS_HOST=redis\n'
              printf 'REDIS_PORT=6379\n'
              printf 'REDIS_PASSWORD=%s\n' "$REDIS_PASSWORD"
              printf 'DB_USERNAME=%s\n' "$DB_USERNAME"
              printf 'DB_PASSWORD=%s\n' "$DB_PASSWORD"
              printf 'DB_NAME=sacco_staging\n'
              printf 'APP_OFFICIAL_EMAIL_DOMAIN=%s\n' "$APP_OFFICIAL_EMAIL_DOMAIN"
              printf 'APP_DEFAULT_ADMIN_EMAIL=%s\n' "$APP_DEFAULT_ADMIN_EMAIL"
              printf 'APP_DEFAULT_ADMIN_PASSWORD=%s\n' "$APP_DEFAULT_ADMIN_PASSWORD"
              printf 'APP_DEFAULT_ADMIN_PHONE=%s\n' "$APP_DEFAULT_ADMIN_PHONE"
              printf 'MPESA_CONSUMER_KEY=%s\n' "$MPESA_CONSUMER_KEY"
              printf 'MPESA_CONSUMER_SECRET=%s\n' "$MPESA_CONSUMER_SECRET"
              printf 'MPESA_PASSKEY=%s\n' "$MPESA_PASSKEY"
              printf 'MPESA_SHORTCODE=%s\n' "$MPESA_SHORTCODE"
              printf 'MPESA_CALLBACK_BASE_URL=%s\n' "$MPESA_CALLBACK_BASE_URL"
              printf 'FRONTEND_URL=%s\n' "$STAGING_FRONTEND_URL"
              printf 'BACKEND_IMAGE=%s\n' "$BACKEND_IMAGE"
              printf 'FRONTEND_IMAGE=%s\n' "$FRONTEND_IMAGE"
            } > .env

            # --no-wait: docker compose starts containers and returns immediately.
            # The healthcheck polling is handled by the dedicated CI step below,
            # which runs from the GitHub runner and has no SSH timeout constraint.
            docker compose -f docker-compose.prod.yml pull
            docker compose -f docker-compose.prod.yml up -d --remove-orphans
            docker image prune -f

      # Health check runs from the GitHub runner — no SSH timeout risk.
      # Polls for up to 4 minutes (48 x 5s).
      - name: Health check — wait for backend
        run: |
          echo "Waiting for backend health check..."
          for i in $(seq 1 48); do
            STATUS=$(curl -L -s -o /dev/null -w "%{http_code}" "${{ vars.STAGING_API_URL }}/actuator/health" || echo "000")
            if [ "$STATUS" = "200" ]; then
              echo "Backend is healthy!"
              exit 0
            fi
            echo "Attempt $i/48 — status $STATUS. Waiting 5s..."
            sleep 5
          done
          echo "Backend health check failed after 4 minutes."
          exit 1

      - name: Health check — frontend
        run: |
          STATUS=$(curl -s -o /dev/null -w "%{http_code}" ${{ vars.STAGING_FRONTEND_URL }} || echo "000")
          if [ "$STATUS" = "200" ]; then
            echo "Frontend is serving."
          else
            echo "Frontend returned HTTP $STATUS"
            exit 1
          fi

      - name: Rollback on failure
        if: failure()
        uses: appleboy/ssh-action@v1
        with:
          host: ${{ secrets.STAGING_HOST }}
          username: ${{ secrets.STAGING_USER }}
          key: ${{ secrets.STAGING_SSH_KEY }}
          passphrase: ${{ secrets.STAGING_SSH_PASSPHRASE }}
          command_timeout: 5m
          script: |
            echo "ROLLING BACK staging deployment..."
            cd /opt/sacco-staging
            docker compose -f docker-compose.prod.yml down --remove-orphans || true
            docker compose -f docker-compose.prod.yml up -d || true

      - name: Notify on failure
        if: failure()
        run: |
          echo "Staging deployment failed. Check workflow logs."
