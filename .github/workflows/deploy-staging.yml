name: Deploy to Staging

# ─── Trigger ──────────────────────────────────────────────────────────────────
# Run ONLY after the CI workflow completes successfully on main.
# Previously this triggered on push directly, which meant staging could deploy
# even when CI was failing. Now it waits for the CI workflow to finish first.
on:
  workflow_run:
    workflows: ["CI"]
    types: [completed]
    branches: [main]

concurrency:
  group: deploy-staging
  cancel-in-progress: true

jobs:
  deploy-staging:
    name: Build & Deploy — Staging
    runs-on: ubuntu-latest
    environment: staging
    # Guard: only proceed when the triggering CI run actually passed.
    if: ${{ github.event.workflow_run.conclusion == 'success' }}

    permissions:
      contents: read
      packages: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          # workflow_run events provide the SHA of the completed run, not HEAD.
          # Using ref from the workflow_run ensures we build the same commit CI tested.
          ref: ${{ github.event.workflow_run.head_sha }}

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract metadata (backend)
        id: meta-backend
        uses: docker/metadata-action@v5
        with:
          images: ghcr.io/${{ github.repository }}/backend
          tags: |
            type=sha,prefix=staging-
            type=raw,value=staging-latest

      - name: Extract metadata (frontend)
        id: meta-frontend
        uses: docker/metadata-action@v5
        with:
          images: ghcr.io/${{ github.repository }}/frontend
          tags: |
            type=sha,prefix=staging-
            type=raw,value=staging-latest

      - name: Build & push backend image
        uses: docker/build-push-action@v5
        with:
          context: secure-sacco/backend/backend
          file: secure-sacco/backend/backend/Dockerfile
          push: true
          tags: ${{ steps.meta-backend.outputs.tags }}
          labels: ${{ steps.meta-backend.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Build & push frontend image
        uses: docker/build-push-action@v5
        with:
          context: secure-sacco/frontend
          file: secure-sacco/frontend/Dockerfile
          push: true
          tags: ${{ steps.meta-frontend.outputs.tags }}
          labels: ${{ steps.meta-frontend.outputs.labels }}
          build-args: |
            VITE_API_BASE_URL=${{ vars.STAGING_API_URL }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

      # ── Copy docker-compose.prod.yml to the staging server ──────────────────
      # The file lives at secure-sacco/infra/docker-compose.prod.yml in the repo.
      # The SSH deploy step expects it at /opt/sacco-staging/docker-compose.prod.yml.
      # Previously the file was never copied, so docker compose pull would fail.
      - name: Copy docker-compose to staging server
        uses: appleboy/scp-action@v0.1.7
        with:
          host: ${{ secrets.STAGING_HOST }}
          username: ${{ secrets.STAGING_USER }}
          key: ${{ secrets.STAGING_SSH_KEY }}
          passphrase: ${{ secrets.STAGING_SSH_PASSPHRASE }}
          source: secure-sacco/infra/docker-compose.prod.yml
          target: /opt/sacco-staging/
          strip_components: 3   # removes secure-sacco/infra/ prefix, leaves docker-compose.prod.yml

      - name: Deploy to staging server
        uses: appleboy/ssh-action@v1
        env:
          # Secrets passed through to the remote script via appleboy's envs mechanism
          APP_FIELD_ENCRYPTION_KEY: ${{ secrets.APP_FIELD_ENCRYPTION_KEY }}
          APP_PII_HMAC_KEY: ${{ secrets.APP_PII_HMAC_KEY }}
          REDIS_PASSWORD: ${{ secrets.REDIS_PASSWORD }}
          DB_USERNAME: ${{ secrets.STAGING_DB_USERNAME }}
          DB_PASSWORD: ${{ secrets.STAGING_DB_PASSWORD }}
          STAGING_GHCR_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          GITHUB_ACTOR: ${{ github.actor }}
        with:
          host: ${{ secrets.STAGING_HOST }}
          username: ${{ secrets.STAGING_USER }}
          key: ${{ secrets.STAGING_SSH_KEY }}
          passphrase: ${{ secrets.STAGING_SSH_PASSPHRASE }}
          envs: APP_FIELD_ENCRYPTION_KEY,APP_PII_HMAC_KEY,REDIS_PASSWORD,DB_USERNAME,DB_PASSWORD,STAGING_GHCR_TOKEN,GITHUB_ACTOR
          script: |
            cd /opt/sacco-staging

            # Authenticate with GHCR so docker compose pull can fetch the images.
            # STAGING_GHCR_TOKEN is the GITHUB_TOKEN from the workflow — it has
            # read:packages permission which is sufficient for pulling.
            echo "$STAGING_GHCR_TOKEN" | docker login ghcr.io -u "$GITHUB_ACTOR" --password-stdin

            # Write the full .env file the docker-compose expects.
            # All secrets are injected via appleboy's `envs` — nothing is hardcoded here.
            cat > .env <<EOF
            APP_FIELD_ENCRYPTION_KEY=$APP_FIELD_ENCRYPTION_KEY
            APP_PII_HMAC_KEY=$APP_PII_HMAC_KEY
            REDIS_HOST=redis
            REDIS_PORT=6379
            REDIS_PASSWORD=$REDIS_PASSWORD
            DB_USERNAME=$DB_USERNAME
            DB_PASSWORD=$DB_PASSWORD
            DB_NAME=sacco_staging
            FRONTEND_URL=${{ vars.STAGING_FRONTEND_URL }}
            EOF

            export BACKEND_IMAGE=ghcr.io/${{ github.repository }}/backend:staging-latest
            export FRONTEND_IMAGE=ghcr.io/${{ github.repository }}/frontend:staging-latest
            docker compose -f docker-compose.prod.yml pull
            docker compose -f docker-compose.prod.yml up -d --remove-orphans
            docker image prune -f

      - name: Health check — wait for backend
        run: |
          echo "Waiting for backend health check..."
          for i in $(seq 1 24); do
            STATUS=$(curl -L -s -o /dev/null -w "%{http_code}" "${{ vars.STAGING_API_URL }}/actuator/health" || echo "000")
            if [ "$STATUS" = "200" ]; then
              echo "Backend is healthy!"
              exit 0
            fi
            echo "Attempt $i/24 — status $STATUS. Waiting 5s..."
            sleep 5
          done
          echo "Backend health check failed after 2 minutes."
          exit 1

      - name: Health check — frontend
        run: |
          STATUS=$(curl -s -o /dev/null -w "%{http_code}" ${{ vars.STAGING_FRONTEND_URL }} || echo "000")
          if [ "$STATUS" = "200" ]; then
            echo "Frontend is serving."
          else
            echo "Frontend returned HTTP $STATUS"
            exit 1
          fi

      - name: Automatic rollback on staging failure
        if: failure()
        uses: appleboy/ssh-action@v1
        with:
          host: ${{ secrets.STAGING_HOST }}
          username: ${{ secrets.STAGING_USER }}
          key: ${{ secrets.STAGING_SSH_KEY }}
          passphrase: ${{ secrets.STAGING_SSH_PASSPHRASE }}
          script: |
            echo "ROLLING BACK staging deployment..."
            cd /opt/sacco-staging
            docker compose -f docker-compose.prod.yml down
            docker compose -f docker-compose.prod.yml up -d

      - name: Notify on failure
        if: failure()
        run: |
          echo "Staging deployment failed. Check workflow logs."
          # Add Slack/email notification here if desired:
          # curl -X POST ${{ secrets.SLACK_WEBHOOK_URL }} -d '{"text":"Staging deploy failed: ${{ github.run_url }}"}'
