name: Deploy to Staging

on:
  push:
    branches: [ main ]

concurrency:
  group: deploy-staging
  cancel-in-progress: true

jobs:
  deploy-staging:
    name: Build & Deploy — Staging
    runs-on: ubuntu-latest
    environment: staging
    permissions:
      contents: read
      packages: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract metadata (backend)
        id: meta-backend
        uses: docker/metadata-action@v5
        with:
          images: ghcr.io/${{ github.repository }}/backend
          tags: |
            type=sha,prefix=staging-
            type=raw,value=staging-latest

      - name: Extract metadata (frontend)
        id: meta-frontend
        uses: docker/metadata-action@v5
        with:
          images: ghcr.io/${{ github.repository }}/frontend
          tags: |
            type=sha,prefix=staging-
            type=raw,value=staging-latest

      - name: Build & push backend image
        uses: docker/build-push-action@v5
        with:
          context: secure-sacco/backend/backend
          file: secure-sacco/backend/backend/Dockerfile
          push: true
          tags: ${{ steps.meta-backend.outputs.tags }}
          labels: ${{ steps.meta-backend.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Build & push frontend image
        uses: docker/build-push-action@v5
        with:
          context: secure-sacco/frontend
          file: secure-sacco/frontend/Dockerfile
          push: true
          tags: ${{ steps.meta-frontend.outputs.tags }}
          labels: ${{ steps.meta-frontend.outputs.labels }}
          build-args: |
            VITE_API_BASE_URL=${{ vars.STAGING_API_URL }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Deploy to staging server
        uses: appleboy/ssh-action@v1
        env:
          APP_FIELD_ENCRYPTION_KEY: ${{ secrets.APP_FIELD_ENCRYPTION_KEY }}
          APP_PII_HMAC_KEY: ${{ secrets.APP_PII_HMAC_KEY }}
          REDIS_PASSWORD: ${{ secrets.REDIS_PASSWORD }}
        with:
          host: ${{ secrets.STAGING_HOST }}
          username: ${{ secrets.STAGING_USER }}
          key: ${{ secrets.STAGING_SSH_KEY }}
          envs: APP_FIELD_ENCRYPTION_KEY,APP_PII_HMAC_KEY,REDIS_PASSWORD
          script: |
            cd /opt/sacco-staging
            
            echo "APP_FIELD_ENCRYPTION_KEY=$APP_FIELD_ENCRYPTION_KEY" > .env
            echo "APP_PII_HMAC_KEY=$APP_PII_HMAC_KEY" >> .env
            echo "REDIS_HOST=redis" >> .env
            echo "REDIS_PORT=6379" >> .env
            echo "REDIS_PASSWORD=$REDIS_PASSWORD" >> .env

            export BACKEND_IMAGE=ghcr.io/${{ github.repository }}/backend:staging-latest
            export FRONTEND_IMAGE=ghcr.io/${{ github.repository }}/frontend:staging-latest
            docker compose -f docker-compose.prod.yml pull
            docker compose -f docker-compose.prod.yml up -d --remove-orphans
            docker image prune -f

      - name: Health check — wait for backend
        run: |
          echo "Waiting for backend health check..."
          for i in $(seq 1 24); do
            STATUS=$(curl -s -o /dev/null -w "%{http_code}" ${{ vars.STAGING_API_URL }}/actuator/health || echo "000")
            if [ "$STATUS" = "200" ]; then
              echo "Backend is healthy!"
              exit 0
            fi
            echo "Attempt $i/24 — status $STATUS. Waiting 5s..."
            sleep 5
          done
          echo "Backend health check failed after 2 minutes."
          exit 1

      - name: Health check — frontend
        run: |
          STATUS=$(curl -s -o /dev/null -w "%{http_code}" ${{ vars.STAGING_FRONTEND_URL }} || echo "000")
          if [ "$STATUS" = "200" ]; then
            echo "Frontend is serving."
          else
            echo "Frontend returned HTTP $STATUS"
            exit 1
          fi

      - name: Notify on failure
        if: failure()
        run: |
          echo "Staging deployment failed. Check workflow logs."
          # Add Slack/email notification here if desired:
          # curl -X POST ${{ secrets.SLACK_WEBHOOK_URL }} -d '{"text":"Staging deploy failed: ${{ github.run_url }}"}'
