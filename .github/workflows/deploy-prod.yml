name: Deploy to Production

on:
  workflow_dispatch:
    inputs:
      image_tag:
        description: 'Staging image tag to promote (e.g. staging-abc1234)'
        required: true
        type: string
      confirm:
        description: 'Type DEPLOY to confirm production deployment'
        required: true
        type: string

jobs:
  # ── Step 1: Validate inputs (GitHub runner) ──────────────────────────────────
  validate:
    name: Validate inputs
    runs-on: ubuntu-latest
    steps:
      - name: Check confirmation
        run: |
          if [ "${{ github.event.inputs.confirm }}" != "DEPLOY" ]; then
            echo "Confirmation text must be exactly: DEPLOY"
            exit 1
          fi
          echo "Confirmation accepted. Proceeding to production."

  # ── Step 2: Re-tag images in GHCR (GitHub runner — needs packages:write) ─────
  retag:
    name: Re-tag images for production
    runs-on: ubuntu-latest
    needs: validate
    permissions:
      contents: read
      packages: write
    steps:
      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Re-tag staging images as prod-latest
        run: |
          TAG=${{ github.event.inputs.image_tag }}
          REPO=ghcr.io/${{ github.repository }}

          docker pull ${REPO}/backend:${TAG}
          docker pull ${REPO}/frontend:${TAG}

          docker tag ${REPO}/backend:${TAG}  ${REPO}/backend:prod-latest
          docker tag ${REPO}/frontend:${TAG} ${REPO}/frontend:prod-latest

          docker push ${REPO}/backend:prod-latest
          docker push ${REPO}/frontend:prod-latest

  # ── Step 3: Deploy — runs directly on tw-core-01 via self-hosted runner ───────
  # No SSH needed — the runner polls GitHub and executes jobs locally.
  deploy-production:
    name: Deploy — Production
    runs-on: self-hosted
    needs: retag
    environment: production

    steps:
      - name: Log in to GitHub Container Registry
        run: |
          echo "${{ secrets.GITHUB_TOKEN }}" | docker login ghcr.io -u "${{ github.actor }}" --password-stdin

      - name: Ensure deploy directories exist
        run: |
          mkdir -p /srv/apps/secure-sacco/{compose,env,uploads,logs,backups}

      - name: Write production .env file
        run: |
          {
            printf 'APP_NAME=Secure Sacco\n'
            printf 'APP_FIELD_ENCRYPTION_KEY=%s\n'   "${{ secrets.APP_FIELD_ENCRYPTION_KEY }}"
            printf 'APP_PII_HMAC_KEY=%s\n'           "${{ secrets.APP_PII_HMAC_KEY }}"
            printf 'REDIS_HOST=redis\n'
            printf 'REDIS_PORT=6379\n'
            printf 'REDIS_PASSWORD=%s\n'             "${{ secrets.REDIS_PASSWORD }}"
            printf 'DB_USERNAME=%s\n'                "${{ secrets.PROD_DB_USERNAME }}"
            printf 'DB_PASSWORD=%s\n'                "${{ secrets.PROD_DB_PASSWORD }}"
            printf 'DB_NAME=sacco_prod\n'
            printf 'CLOUDINARY_URL=%s\n'             "${{ secrets.CLOUDINARY_URL }}"
            printf 'COOP_BASIC_AUTH=%s\n'            "${{ secrets.COOP_BASIC_AUTH }}"
            printf 'APP_OFFICIAL_EMAIL_DOMAIN=%s\n'  "${{ vars.APP_OFFICIAL_EMAIL_DOMAIN }}"
            printf 'APP_DEFAULT_ADMIN_EMAIL=%s\n'    "${{ vars.APP_DEFAULT_ADMIN_EMAIL }}"
            printf 'APP_DEFAULT_ADMIN_PASSWORD=%s\n' "${{ secrets.APP_DEFAULT_ADMIN_PASSWORD }}"
            printf 'APP_DEFAULT_ADMIN_PHONE=%s\n'    "${{ vars.APP_DEFAULT_ADMIN_PHONE }}"
            printf 'COOP_CONSUMER_KEY=%s\n'          "${{ secrets.COOP_CONSUMER_KEY }}"
            printf 'COOP_CONSUMER_SECRET=%s\n'       "${{ secrets.COOP_CONSUMER_SECRET }}"
            printf 'COOP_OPERATOR_CODE=%s\n'         "${{ vars.COOP_OPERATOR_CODE }}"
            printf 'COOP_BASE_URL=%s\n'              "${{ vars.COOP_BASE_URL }}"
            printf 'COOP_CALLBACK_BASE_URL=%s\n'     "${{ vars.COOP_CALLBACK_BASE_URL }}"
            printf 'COOP_SACCO_ACCOUNT_NUMBER=%s\n'  "${{ secrets.COOP_SACCO_ACCOUNT_NUMBER }}"
            printf 'COOP_ALLOWED_CALLBACK_IPS=%s\n'  "${{ vars.COOP_ALLOWED_CALLBACK_IPS }}"
            printf 'COOP_PROXY_HOST=%s\n'            "${{ vars.COOP_PROXY_HOST }}"
            printf 'COOP_PROXY_PORT=%s\n'            "${{ vars.COOP_PROXY_PORT }}"
            printf 'RESEND_API_KEY=%s\n'             "${{ secrets.RESEND_API_KEY }}"
            printf 'MAIL_FROM=%s\n'                  "${{ vars.MAIL_FROM }}"
            printf 'FRONTEND_URL=%s\n'               "${{ vars.FRONTEND_URL }}"
            printf 'BACKEND_IMAGE=%s\n'              "ghcr.io/${{ github.repository }}/backend:prod-latest"
            printf 'FRONTEND_IMAGE=%s\n'             "ghcr.io/${{ github.repository }}/frontend:prod-latest"
          } > /srv/apps/secure-sacco/env/.env.production

      - name: Pull latest images
        run: |
          docker compose \
            -f /srv/apps/secure-sacco/compose/docker-compose.prod.yml \
            --env-file /srv/apps/secure-sacco/env/.env.production \
            pull

      - name: Deploy containers
        id: deploy
        run: |
          docker compose \
            -f /srv/apps/secure-sacco/compose/docker-compose.prod.yml \
            --env-file /srv/apps/secure-sacco/env/.env.production \
            up -d
          docker image prune -f

      # Health checks run locally on the server — no public URL required yet
      - name: Health check — backend
        id: health-check
        run: |
          echo "Waiting for backend to become healthy..."
          for i in $(seq 1 48); do
            STATUS=$(curl -s -o /dev/null -w "%{http_code}" http://localhost:8080/actuator/health || echo "000")
            if [ "$STATUS" = "200" ]; then
              echo "Backend is healthy!"
              exit 0
            fi
            echo "Attempt $i/48 — HTTP $STATUS. Waiting 5s..."
            sleep 5
          done
          echo "Health check FAILED after 4 minutes."
          exit 1

      - name: Health check — frontend
        run: |
          STATUS=$(curl -s -o /dev/null -w "%{http_code}" http://localhost:3000 || echo "000")
          if [ "$STATUS" = "200" ]; then
            echo "Frontend is serving."
          else
            echo "Frontend returned HTTP $STATUS — check container logs."
            exit 1
          fi

      # ── Rollback ──────────────────────────────────────────────────────────────
      - name: Automatic rollback on health failure
        if: failure() && steps.health-check.outcome == 'failure'
        run: |
          echo "ROLLING BACK production deployment..."
          docker compose \
            -f /srv/apps/secure-sacco/compose/docker-compose.prod.yml \
            --env-file /srv/apps/secure-sacco/env/.env.production \
            down --remove-orphans || true
          docker compose \
            -f /srv/apps/secure-sacco/compose/docker-compose.prod.yml \
            --env-file /srv/apps/secure-sacco/env/.env.production \
            up -d || true
          echo "Rollback complete."

      - name: Notify on success
        if: success()
        run: echo "Production deployment successful — ${{ github.event.inputs.image_tag }}"

      - name: Notify on failure
        if: failure()
        run: echo "Production deployment FAILED. Check workflow logs at ${{ github.run_url }}"