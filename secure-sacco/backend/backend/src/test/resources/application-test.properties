# Test-specific configuration
# Disable DataInitializer to avoid SYSTEM_ADMIN role issues
app.data-initializer.enabled=false

# PII encryption keys — TEST PLACEHOLDERS ONLY. NOT for production.
app.field-encryption-key=dGVzdGVuY3J5cHRpb25rZXlfZm9yX2Rldl9vbmx5X18=
app.pii-hmac-key=dGVzdGhtYWNrZXlfZm9yX2Rldl9vbmx5XzMyYnl0ZXM=

# Co-op Connect — dummy values so the context loads; no real API calls in tests
sacco.coopconnect.consumer-key=test-consumer-key
sacco.coopconnect.consumer-secret=test-consumer-secret

# Disable Flyway for tests (optional - can be enabled if needed)
spring.flyway.enabled=false

# Database settings - use environment variables (DB_URL, DB_USERNAME, DB_PASSWORD)
# which are set by the CI workflow, or fallback to embedded/H2 if not available

# Redis settings for tests - use environment variables
spring.data.redis.host=${REDIS_HOST:localhost}
spring.data.redis.port=${REDIS_PORT:6379}

# Logging
logging.level.com.jaytechwave.sacco=DEBUG