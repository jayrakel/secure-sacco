# Test-specific configuration
# Disable DataInitializer to avoid SYSTEM_ADMIN role issues
app.data-initializer.enabled=false

# Disable Flyway for tests (optional - can be enabled if needed)
spring.flyway.enabled=false

# Database settings - use environment variables (DB_URL, DB_USERNAME, DB_PASSWORD)
# which are set by the CI workflow, or fallback to embedded/H2 if not available

# Redis settings for tests - use environment variables
spring.data.redis.host=${REDIS_HOST:localhost}
spring.data.redis.port=${REDIS_PORT:6379}

# Logging
logging.level.com.jaytechwave.sacco=DEBUG