server:
  port: ${SERVER_PORT:8080}
  servlet:
    session:
      cookie:
        secure: true       # Forces the session cookie to ONLY be sent over HTTPS
        http-only: true
        same-site: Strict  # Prevents the cookie from being sent on cross-site requests

spring:
  application:
    name: ${APP_NAME:Secure SACCO}

  data:
    redis:
      host: ${REDIS_HOST:localhost}
      port: ${REDIS_PORT:6379}
      password: ${REDIS_PASSWORD:}

  datasource:
    url: ${DB_URL:jdbc:postgresql://localhost:5433/sacco_db}
    username: ${DB_USERNAME:postgres}
    password: ${DB_PASSWORD:postgres}
    driver-class-name: org.postgresql.Driver
    hikari:
      # Sensible defaults for the base profile; override in application-prod.yml
      maximum-pool-size: 10
      minimum-idle: 2
      connection-timeout: 30000      # 30 seconds
      idle-timeout: 600000           # 10 minutes
      max-lifetime: 1800000          # 30 minutes
      pool-name: SaccoHikariPool
      # Validate connections before use (avoids stale connection errors after DB restart)
      connection-test-query: SELECT 1

  session:
    store-type: redis
    redis:
      flush-mode: on_save
      namespace: ${APP_NAME:secure-sacco}-sessions
    timeout: 30m # 1800s

  jpa:
    hibernate:
      ddl-auto: validate
    open-in-view: false
    properties:
      hibernate:
        format_sql: true
        jdbc:
          time_zone: UTC

  flyway:
    enabled: true
    locations: classpath:db/migration
    baseline-on-migrate: false

  jackson:
    time-zone: UTC

  # ── Outgoing email (Resend API) ───────────────────────────────────────────
  # Set RESEND_API_KEY in environment. Get your key at https://resend.com
  # MAIL_FROM must be a verified sender address or domain in Resend.
  mail:
    host: smtp.resend.com
    port: 465
    username: resend
    password: ${RESEND_API_KEY:}
    from: ${MAIL_FROM:noreply@jaytechwavesolutions.co.ke}
    properties:
      mail:
        smtp:
          auth: true
          ssl:
            enable: true
          connectiontimeout: 5000
          timeout: 5000
          writetimeout: 5000

# LOGGING: Base profile logs only at INFO/WARN.
# DEBUG-level security and web logging is in application-dev.yml ONLY.
# This prevents accidental sensitive log leakage if the prod profile is not activated.
logging:
  level:
    root: INFO
    org.flywaydb: INFO

app:
  field-encryption-key: ${APP_FIELD_ENCRYPTION_KEY}   # Base64-encoded 32-byte AES key
  pii-hmac-key: ${APP_PII_HMAC_KEY}                   # Base64-encoded 32-byte HMAC key

  # Public URL of the frontend — used to build links in outgoing emails.
  frontend-url: ${FRONTEND_URL:http://localhost:5173}

  official-email-domain: ${APP_OFFICIAL_EMAIL_DOMAIN:jaytechwave.org}

  default-admin:
    email: ${APP_DEFAULT_ADMIN_EMAIL:admin@jaytechwave.org}
    password: ${APP_DEFAULT_ADMIN_PASSWORD:Admin@12345678}
    phone: ${APP_DEFAULT_ADMIN_PHONE:+254700000000}

    security:
      password:
        argon2:
          salt-length: ${APP_ARGON2_SALT_LENGTH:16}
          hash-length: ${APP_ARGON2_HASH_LENGTH:32}
          parallelism: ${APP_ARGON2_PARALLELISM:1}
          memory: ${APP_ARGON2_MEMORY:65536}
          iterations: ${APP_ARGON2_ITERATIONS:3}

# --- SECURITY & CORS BASELINE (PROD DEFAULTS) ---
sacco:
  security:
    cors:
      allowed-origins: "${FRONTEND_URL:http://localhost:5173}" # Change this to your actual frontend prod URL

  safaricom:
    daraja:
      # Environment: 'production' or 'sandbox'
      env: ${MPESA_ENV:production}

      # Credentials
      consumer-key: ${MPESA_CONSUMER_KEY}
      consumer-secret: ${MPESA_CONSUMER_SECRET}
      passkey: ${MPESA_PASSKEY}

      # Shortcodes (Paybill / Till Number)
      shortcode: ${MPESA_SHORTCODE}
      b2c-shortcode: ${MPESA_B2C_SHORTCODE:}

      # Webhooks / Callbacks
      callback-base-url: ${MPESA_CALLBACK_BASE_URL:https://api.securesacco.com}

      # Callback IP allowlist (Safaricom production IP ranges)
      allowed-callback-ips: ${MPESA_ALLOWED_CALLBACK_IPS:196.201.214.200,196.201.214.206,196.201.213.114,196.201.214.207,196.201.214.208,196.201.214.209,196.201.212.138}

      # Specific API Endpoints Callbacks (Relative paths)
      endpoints:
        mpesa-express-callback: /api/v1/payments/mpesa/stk-callback
        c2b-validation: /api/v1/payments/mpesa/c2b-validate
        c2b-confirmation: /api/v1/payments/mpesa/c2b-confirm
        b2c-result: /api/v1/payments/mpesa/b2c-result
        b2c-queue-timeout: /api/v1/payments/mpesa/b2c-queue-timeout

management:
  endpoints:
    web:
      exposure:
        include: health,info,metrics,prometheus
  endpoint:
    health:
      show-details: when-authorized   # Full details for authenticated SYSTEM_ADMIN only
      show-components: when-authorized
  health:
    redis:
      enabled: true
    db:
      enabled: true
    diskspace:
      enabled: true
  # Tag all metrics with the application name for Prometheus/Grafana dashboards
  metrics:
    tags:
      application: ${spring.application.name}

springdoc:
  api-docs:
    path: /api-docs
  swagger-ui:
    path: /swagger-ui
    tags-sorter: alpha
    operations-sorter: method
    display-request-duration: true
  packages-to-scan: com.jaytechwave.sacco.modules
  paths-to-exclude: /actuator/**

