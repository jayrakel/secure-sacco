server:
  port: ${SERVER_PORT:8080}
  servlet:
    session:
      cookie:
        secure: true       # Forces the session cookie to ONLY be sent over HTTPS
        http-only: true
        same-site: Strict  # Prevents the cookie from being sent on cross-site requests

spring:
  application:
    name: ${APP_NAME:Secure SACCO}

  data:
    redis:
      host: ${REDIS_HOST:localhost}
      port: ${REDIS_PORT:6379}
      password: ${REDIS_PASSWORD:}

  datasource:
    url: ${DB_URL:jdbc:postgresql://localhost:5433/sacco_db}
    username: ${DB_USERNAME:postgres}
    password: ${DB_PASSWORD:postgres}
    driver-class-name: org.postgresql.Driver
    hikari:
      # Sensible defaults for the base profile; override in application-prod.yml
      maximum-pool-size: 10
      minimum-idle: 2
      connection-timeout: 30000      # 30 seconds
      idle-timeout: 600000           # 10 minutes
      max-lifetime: 1800000          # 30 minutes
      pool-name: SaccoHikariPool
      # Validate connections before use (avoids stale connection errors after DB restart)
      connection-test-query: SELECT 1

  session:
    store-type: redis
    redis:
      flush-mode: on_save
      namespace: ${APP_NAME:secure-sacco}-sessions
    timeout: 30m # 1800s

  jpa:
    hibernate:
      ddl-auto: validate
    open-in-view: false
    properties:
      hibernate:
        format_sql: true
        jdbc:
          time_zone: Africa/Nairobi

  flyway:
    enabled: true
    locations: classpath:db/migration
    baseline-on-migrate: false

  jackson:
    time-zone: Africa/Nairobi
    serialization:
      write-dates-as-timestamps: false        # serialize as ISO-8601 string not array
      write-dates-with-zone-id: false         # LocalDateTime gets offset not zone ID
      write-dates-with-context-time-zone: true # apply the time-zone above to output
    deserialization:
      adjust-dates-to-context-time-zone: true # inbound dates adjusted to Africa/Nairobi

  # ── Outgoing email (Resend HTTP API) ─────────────────────────────────────
  # Resend sends over HTTPS (port 443) — no SMTP port restrictions.
  # Get your API key at https://resend.com
  mail:
    from: ${MAIL_FROM:noreply@${APP_OFFICIAL_EMAIL_DOMAIN}}

resend:
  api-key: ${RESEND_API_KEY:}

# LOGGING: Base profile logs only at INFO/WARN.
# DEBUG-level security and web logging is in application-dev.yml ONLY.
# This prevents accidental sensitive log leakage if the prod profile is not activated.
logging:
  level:
    root: INFO
    org.flywaydb: INFO

app:
  field-encryption-key: ${APP_FIELD_ENCRYPTION_KEY}   # Base64-encoded 32-byte AES key
  pii-hmac-key: ${APP_PII_HMAC_KEY}                   # Base64-encoded 32-byte HMAC key

  # Public URL of the frontend — used to build links in outgoing emails.
  frontend-url: ${FRONTEND_URL:http://localhost:5173}

  official-email-domain: ${APP_OFFICIAL_EMAIL_DOMAIN:jaytech.org}

  default-admin:
    email: ${APP_DEFAULT_ADMIN_EMAIL:admin@${APP_OFFICIAL_EMAIL_DOMAIN}}
    password: ${APP_DEFAULT_ADMIN_PASSWORD:Admin@12345678}
    phone: ${APP_DEFAULT_ADMIN_PHONE:+254700000000}

    security:
      password:
        argon2:
          salt-length: ${APP_ARGON2_SALT_LENGTH:16}
          hash-length: ${APP_ARGON2_HASH_LENGTH:32}
          parallelism: ${APP_ARGON2_PARALLELISM:1}
          memory: ${APP_ARGON2_MEMORY:65536}
          iterations: ${APP_ARGON2_ITERATIONS:3}

  time-travel:
    enabled: true
    migration:
      enabled: true

# Africa's Talking SMS gateway — phone OTP delivery (SAC-198)
africastalking:
  username:  ${AT_USERNAME:sandbox}
  api-key:   ${AT_API_KEY:}
  sender-id: ${AT_SENDER_ID:}
  sandbox:   ${AT_SANDBOX:true}

# --- SECURITY & CORS BASELINE (PROD DEFAULTS) ---
sacco:
  security:
    cors:
      allowed-origins: "${FRONTEND_URL:http://localhost:5173}" # Change this to your actual frontend prod URL

  coopconnect:
    # Co-op Connect API credentials (from Co-op Bank onboarding)
    consumer-key:      ${COOP_CONSUMER_KEY}
    consumer-secret:   ${COOP_CONSUMER_SECRET}
    basic-auth:        ${COOP_BASIC_AUTH:}

    # Operator code assigned by Co-op Bank to Betterlink Ventures
    operator-code:     ${COOP_OPERATOR_CODE:BETTERLINK}

    # Co-op Connect production API base URL
    base-url:          ${COOP_BASE_URL:https://openapi.co-opbank.co.ke}

    # Your server base URL — Co-op will POST callbacks to:
    #   {callback-base-url}/api/v1/payments/coop/stk-callback
    #   {callback-base-url}/api/v1/payments/coop/ipn
    callback-base-url: ${COOP_CALLBACK_BASE_URL:https://api.betterlinkventureslimited.co.ke}

    # SACCO's Co-op Bank account number (for balance / mini-statement queries)
    sacco-account-number: ${COOP_SACCO_ACCOUNT_NUMBER:}

    # Co-op Connect callback IP whitelist — set once Co-op provides their IPs.
    # When empty the filter allows all IPs (bypass mode) with a warning.
    allowed-callback-ips: ${COOP_ALLOWED_CALLBACK_IPS:}


    proxy-host:        ${COOP_PROXY_HOST:}
    proxy-port:        ${COOP_PROXY_PORT:8888}


management:
  endpoints:
    web:
      exposure:
        include: health,info,metrics,prometheus
  endpoint:
    health:
      show-details: when-authorized   # Full details for authenticated SYSTEM_ADMIN only
      show-components: when-authorized
  health:
    redis:
      enabled: true
    db:
      enabled: true
    diskspace:
      enabled: true
  # Tag all metrics with the application name for Prometheus/Grafana dashboards
  metrics:
    tags:
      application: ${spring.application.name}

springdoc:
  api-docs:
    path: /api-docs
  swagger-ui:
    path: /swagger-ui
    tags-sorter: alpha
    operations-sorter: method
    display-request-duration: true
  packages-to-scan: com.jaytechwave.sacco.modules
  paths-to-exclude: /actuator/**