server:
  forward-headers-strategy: framework
  servlet:
    session:
      cookie:
        name: SACCO_SESSION
        domain: jaytechwavesolutions.co.ke
        same-site: none
        secure: true
        http-only: true

spring:
  flyway:
    repair-on-migrate: false
  datasource:
    url: ${DB_URL}
    username: ${DB_USERNAME}
    password: ${DB_PASSWORD}
    hikari:
      maximum-pool-size: 20
      minimum-idle: 5
      connection-timeout: 30000
      idle-timeout: 600000
      max-lifetime: 1800000
      pool-name: SaccoHikariPool-Prod
      leak-detection-threshold: 60000

sacco:
  security:
    cors:
      allowed-origins:
        - "${FRONTEND_URL}"

  safaricom:
    daraja:
      env: production
      consumer-key: ${MPESA_CONSUMER_KEY}
      consumer-secret: ${MPESA_CONSUMER_SECRET}
      passkey: ${MPESA_PASSKEY}
      shortcode: ${MPESA_SHORTCODE}
      callback-base-url: ${MPESA_CALLBACK_BASE_URL}

logging:
  level:
    root: WARN
    org.springframework.security: WARN
    org.springframework.web: WARN
    org.flywaydb: WARN

# Production: admin credentials MUST be set via environment variables.
# No fallback values — application will fail to start if these are missing.
app:
  default-admin:
    email: ${APP_DEFAULT_ADMIN_EMAIL}
    password: ${APP_DEFAULT_ADMIN_PASSWORD}
    phone: ${APP_DEFAULT_ADMIN_PHONE}

management:
  health:
    mail:
      enabled: false
  endpoints:
    web:
      exposure:
        # In prod, expose only health (for load balancer) and prometheus (for metrics scraper)
        include: health,prometheus
  endpoint:
    health:
      show-details: when-authorized

springdoc:
  swagger-ui:
    enabled: false   # UI disabled in prod; /api-docs JSON still available for SYSTEM_ADMIN

