server:
  # Required when running behind a reverse proxy (Nginx, Render, Railway, etc.).
  # Instructs Spring Boot to trust X-Forwarded-For / X-Forwarded-Proto headers,
  # which MpesaIpWhitelistFilter relies on to resolve the real caller IP.
  forward-headers-strategy: framework
  servlet:
    session:
      cookie:
        secure: true
        http-only: true
        same-site: Strict

spring:
  flyway:
    repair-on-migrate: false   # Never auto-repair in production

  datasource:
    hikari:
      # Production pool sizing: tune based on your Postgres max_connections setting.
      # Rule of thumb: (num_cores * 2) + disk spindle count. Adjust after load testing.
      maximum-pool-size: 20
      minimum-idle: 5
      connection-timeout: 30000
      idle-timeout: 600000
      max-lifetime: 1800000
      pool-name: SaccoHikariPool-Prod
      leak-detection-threshold: 60000   # Warn if connection held >60s — catches connection leaks


sacco:
  security:
    cors:
      allowed-origins:
        - "${FRONTEND_URL}"

  safaricom:
    daraja:
      env: production
      consumer-key: ${MPESA_CONSUMER_KEY}
      consumer-secret: ${MPESA_CONSUMER_SECRET}
      passkey: ${MPESA_PASSKEY}
      shortcode: ${MPESA_SHORTCODE}
      callback-base-url: ${MPESA_CALLBACK_BASE_URL}

logging:
  level:
    root: WARN
    org.springframework.security: WARN
    org.springframework.web: WARN
    org.flywaydb: WARN

# Production: admin credentials MUST be set via environment variables.
# No fallback values — application will fail to start if these are missing.
app:
  default-admin:
    email: ${APP_DEFAULT_ADMIN_EMAIL}
    password: ${APP_DEFAULT_ADMIN_PASSWORD}
    phone: ${APP_DEFAULT_ADMIN_PHONE}

management:
  endpoints:
    web:
      exposure:
        # In prod, expose only health (for load balancer) and prometheus (for metrics scraper)
        include: health,prometheus
  endpoint:
    health:
      show-details: when-authorized

springdoc:
  swagger-ui:
    enabled: false   # UI disabled in prod; /api-docs JSON still available for SYSTEM_ADMIN

