server:
  forward-headers-strategy: framework
  servlet:
    session:
      cookie:
        name: SACCO_SESSION
        domain: betterlinkventureslimited.co.ke
        same-site: none
        secure: true
        http-only: true

spring:
  flyway:
    repair-on-migrate: false
  datasource:
    url: ${DB_URL}
    username: ${DB_USERNAME}
    password: ${DB_PASSWORD}
    hikari:
      maximum-pool-size: 20
      minimum-idle: 5
      connection-timeout: 30000
      idle-timeout: 600000
      max-lifetime: 1800000
      pool-name: SaccoHikariPool-Prod
      leak-detection-threshold: 60000

sacco:
  security:
    cors:
      allowed-origins:
        - "${FRONTEND_URL}"
  coopconnect:
    consumer-key:         ${COOP_CONSUMER_KEY}
    consumer-secret:      ${COOP_CONSUMER_SECRET}
    operator-code:        ${COOP_OPERATOR_CODE:BETTERLINK}
    base-url:             ${COOP_BASE_URL:https://openapi.co-opbank.co.ke}
    callback-base-url:    ${COOP_CALLBACK_BASE_URL}
    sacco-account-number: ${COOP_SACCO_ACCOUNT_NUMBER:}
    allowed-callback-ips: ${COOP_ALLOWED_CALLBACK_IPS:}

logging:
  level:
    root: WARN
    org.springframework.security: WARN
    org.springframework.web: WARN
    org.flywaydb: WARN
    # Raise payments to INFO so Co-op STK push and IPN activity is visible in logs
    com.jaytechwave.sacco.modules.payments: INFO

# Production: admin credentials MUST be set via environment variables.
# No fallback values — application will fail to start if these are missing.
app:
  default-admin:
    email:    ${APP_DEFAULT_ADMIN_EMAIL}
    password: ${APP_DEFAULT_ADMIN_PASSWORD}
    phone:    ${APP_DEFAULT_ADMIN_PHONE}

management:
  health:
    mail:
      enabled: false
  endpoints:
    web:
      exposure:
        include: health,prometheus
  endpoint:
    health:
      show-details: when-authorized

springdoc:
  swagger-ui:
    enabled: false   # UI disabled in prod; /api-docs JSON still available for SYSTEM_ADMIN