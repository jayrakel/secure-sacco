spring:
  datasource:
    url: jdbc:h2:mem:testdb;DB_CLOSE_DELAY=-1;DB_CLOSE_ON_EXIT=FALSE
    username: sa
    password:
    driver-class-name: org.h2.Driver

  jpa:
    hibernate:
      ddl-auto: create-drop
    database-platform: org.hibernate.dialect.H2Dialect

  flyway:
    enabled: false   # Use ddl-auto in tests, not Flyway

  data:
    redis:
      host: localhost
      port: 6370   # Use a different port — point to embedded/test Redis

  session:
    store-type: none   # In-memory sessions for tests

sacco:
  security:
    cors:
      allowed-origins:
        - "http://localhost:3000"
  safaricom:
    daraja:
      env: sandbox
      consumer-key: test_key
      consumer-secret: test_secret
      passkey: test_passkey
      shortcode: "174379"
      callback-base-url: "http://localhost:8080"