# PII encryption keys — DEV FALLBACKS ONLY. NOT for production.
# Set APP_FIELD_ENCRYPTION_KEY and APP_PII_HMAC_KEY env vars in prod/staging.
app:
  field-encryption-key: ${APP_FIELD_ENCRYPTION_KEY:dGVzdGVuY3J5cHRpb25rZXlfZm9yX2Rldl9vbmx5X18=}
  pii-hmac-key: ${APP_PII_HMAC_KEY:dGVzdGhtYWNrZXlfZm9yX2Rldl9vbmx5XzMyYnl0ZXM=}

server:
  servlet:
    session:
      cookie:
        secure: false      # Allowed for local HTTP testing
        same-site: Lax     # Required for local cross-port (8080 to 5173) cookie delivery

# DEV ONLY: verbose logging for debugging. Never present in base or prod profiles.
logging:
