# --- LOCAL DEV SECURITY OVERRIDES ---
sacco:
  security:
    cors:
      allowed-origins: "http://localhost:5173"

  safaricom:
    daraja:
      env: sandbox
      consumer-key: ${MPESA_CONSUMER_KEY:your_sandbox_consumer_key_here}
      consumer-secret: ${MPESA_CONSUMER_SECRET:your_sandbox_consumer_secret_here}
      passkey: ${MPESA_PASSKEY:bfb279f9aa9bdbcf158e97dd71a467cd2e0c893059b10f78e6b72ada1ed2c919}
      shortcode: ${MPESA_SHORTCODE:174379}
      callback-base-url: ${MPESA_CALLBACK_BASE_URL:https://7d6d-2c0f-fe38-2335-8176-c5a4-4c82-ac32-e219.ngrok-free.app}

# PII encryption keys — DEV FALLBACKS ONLY. NOT for production.
# Set APP_FIELD_ENCRYPTION_KEY and APP_PII_HMAC_KEY env vars in prod/staging.
app:
  field-encryption-key: ${APP_FIELD_ENCRYPTION_KEY:dGVzdGVuY3J5cHRpb25rZXlfZm9yX2Rldl9vbmx5X18=}
  pii-hmac-key: ${APP_PII_HMAC_KEY:dGVzdGhtYWNrZXlfZm9yX2Rldl9vbmx5XzMyYnl0ZXM=}

server:
  servlet:
    session:
      cookie:
        secure: false      # Allowed for local HTTP testing
        same-site: Lax     # Required for local cross-port (8080 to 5173) cookie delivery

# DEV ONLY: verbose logging for debugging. Never present in base or prod profiles.
logging:
  level:
    root: INFO
    org.springframework.security: DEBUG
    org.springframework.web.cors: DEBUG
    org.springframework.web: DEBUG
    org.flywaydb: INFO
