<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <link rel="icon" type="image/svg+xml" href="/vite.svg" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Secure SACCO System</title>
  <script>
    // Instant-paint the correct tab title before React mounts, using the same
    // cache SettingsProvider writes to after every successful settings fetch.
    try {
      const cached = localStorage.getItem('saccoSettingsCache');
      if (cached) {
        const settings = JSON.parse(cached);
        if (settings && settings.saccoName) {
          document.title = settings.saccoName + ' - Secure SACCO';
        }
      }
    } catch (e) {
      // Corrupt cache or localStorage unavailable — keep the static default title.
    }
  </script>
</head>
<body>
<div id="root"></div>

<script type="module" src="/src/main.tsx"></script>
</body>
</html>
