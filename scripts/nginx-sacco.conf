# ─── Secure SACCO — nginx vhost config ────────────────────────────────────────
# Copy this file to /srv/infrastructure/configs/nginx/sacco.conf on tw-core-01
# then reload Nginx:  docker compose -f /srv/techwave-core/compose/compose.yml exec nginx nginx -s reload
#
# Cloudflare Tunnel terminates TLS at the edge, so Nginx only sees plain HTTP.
# SSL is NOT configured here — Cloudflare handles it.
# ──────────────────────────────────────────────────────────────────────────────

# ─── Frontend ─────────────────────────────────────────────────────────────────
server {
    listen 80;
    server_name betterlinkventureslimited.co.ke www.betterlinkventureslimited.co.ke;

    # Trust Cloudflare's real-IP header so logs and app see the client IP
    real_ip_header     CF-Connecting-IP;
    real_ip_recursive  on;

    location / {
        proxy_pass         http://127.0.0.1:3000;
        proxy_http_version 1.1;
        proxy_set_header   Host              $host;
        proxy_set_header   X-Real-IP         $remote_addr;
        proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto https;
        proxy_read_timeout 60s;
    }
}

# ─── Backend API ──────────────────────────────────────────────────────────────
server {
    listen 80;
    server_name api.betterlinkventureslimited.co.ke;

    real_ip_header     CF-Connecting-IP;
    real_ip_recursive  on;

    # Accommodate file uploads (Cloudinary, member docs, etc.)
    client_max_body_size 50M;

    location / {
        proxy_pass         http://127.0.0.1:8080;
        proxy_http_version 1.1;
        proxy_set_header   Host              $host;
        proxy_set_header   X-Real-IP         $remote_addr;
        proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
        # Hardcode https — Spring Boot may use this to build HTTPS redirect URLs
        proxy_set_header   X-Forwarded-Proto https;
        proxy_read_timeout 120s;
        proxy_connect_timeout 10s;
        proxy_send_timeout 120s;

        # Allow large response buffers for paginated API responses
        proxy_buffer_size       16k;
        proxy_buffers           8 16k;
        proxy_busy_buffers_size 32k;
    }
}
